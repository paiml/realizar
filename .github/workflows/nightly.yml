name: Nightly Binary Release

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            binary: realizar
            artifact: realizar-x86_64-linux
            use_cross: true
          - target: x86_64-apple-darwin
            runner: macos-latest
            binary: realizar
            artifact: realizar-x86_64-macos
            use_cross: false
          - target: aarch64-apple-darwin
            runner: macos-latest
            binary: realizar
            artifact: realizar-aarch64-macos
            use_cross: false
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            binary: realizar.exe
            artifact: realizar-x86_64-windows.exe
            use_cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Checkout sibling dep — trueno (trueno, trueno-gpu, trueno-quant, trueno-cuda-edge)
        uses: actions/checkout@v4
        with:
          repository: paiml/trueno
          path: deps/trueno

      - name: Checkout sibling dep — aprender
        uses: actions/checkout@v4
        with:
          repository: paiml/aprender
          path: deps/aprender

      - name: Checkout sibling dep — trueno-db
        uses: actions/checkout@v4
        with:
          repository: paiml/trueno-db
          path: deps/trueno-db

      - name: Checkout sibling dep — trueno-viz
        uses: actions/checkout@v4
        with:
          repository: paiml/trueno-viz
          path: deps/trueno-viz

      - name: Symlink sibling deps to expected paths (unix)
        if: runner.os != 'Windows'
        run: |
          ln -sf "$GITHUB_WORKSPACE/deps/trueno" "$GITHUB_WORKSPACE/../trueno"
          ln -sf "$GITHUB_WORKSPACE/deps/aprender" "$GITHUB_WORKSPACE/../aprender"
          ln -sf "$GITHUB_WORKSPACE/deps/trueno-db" "$GITHUB_WORKSPACE/../trueno-db"
          ln -sf "$GITHUB_WORKSPACE/deps/trueno-viz" "$GITHUB_WORKSPACE/../trueno-viz"

      - name: Symlink sibling deps to expected paths (windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          mklink /D "%GITHUB_WORKSPACE%\..\trueno" "%GITHUB_WORKSPACE%\deps\trueno"
          mklink /D "%GITHUB_WORKSPACE%\..\aprender" "%GITHUB_WORKSPACE%\deps\aprender"
          mklink /D "%GITHUB_WORKSPACE%\..\trueno-db" "%GITHUB_WORKSPACE%\deps\trueno-db"
          mklink /D "%GITHUB_WORKSPACE%\..\trueno-viz" "%GITHUB_WORKSPACE%\deps\trueno-viz"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Ensure target is installed
        run: rustup target add ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Prepare cross deps directory
        if: matrix.use_cross
        run: |
          # Cross mounts $GITHUB_WORKSPACE but not its parent.
          # Resolve symlinks to real paths for Docker volume mounts.
          PARENT="$(cd "$GITHUB_WORKSPACE/.." && pwd)"
          echo "CROSS_PARENT=$PARENT" >> "$GITHUB_ENV"

      - name: Build (cross)
        if: matrix.use_cross
        env:
          CROSS_CONTAINER_OPTS: >-
            -v ${{ env.CROSS_PARENT }}/trueno:${{ env.CROSS_PARENT }}/trueno
            -v ${{ env.CROSS_PARENT }}/aprender:${{ env.CROSS_PARENT }}/aprender
            -v ${{ env.CROSS_PARENT }}/trueno-db:${{ env.CROSS_PARENT }}/trueno-db
            -v ${{ env.CROSS_PARENT }}/trueno-viz:${{ env.CROSS_PARENT }}/trueno-viz
        run: cross build --release --target ${{ matrix.target }} --features cli

      - name: Build (native)
        if: "!matrix.use_cross"
        run: cargo build --release --target ${{ matrix.target }} --features cli

      - name: Rename binary
        shell: bash
        run: cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Publish Nightly Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Prepare release assets
        run: |
          mkdir -p release/
          find artifacts/ -type f | while read f; do
            cp "$f" release/
          done
          ls -lh release/

      - name: Delete existing nightly tag
        run: gh release delete nightly --cleanup-tag -y || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Nightly Build (${{ github.sha }})"
          body: |
            Automated nightly build from `main` branch.
            Commit: ${{ github.sha }}
            Date: ${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}
          prerelease: true
          files: release/*
          make_latest: false
