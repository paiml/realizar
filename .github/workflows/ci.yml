# CI — test, coverage, security
# Unified gate runs separately via org ruleset on PRs.

name: CI

on:
  pull_request_target:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:  # manual trigger for testing

# One CI run per branch/PR; cancel stale runs on same branch
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout sibling deps
        uses: actions/checkout@v4
        with:
          repository: paiml/trueno
          path: deps/trueno
      - uses: actions/checkout@v4
        with:
          repository: paiml/aprender
          path: deps/aprender
      - uses: actions/checkout@v4
        with:
          repository: paiml/trueno-db
          path: deps/trueno-db
      - uses: actions/checkout@v4
        with:
          repository: paiml/trueno-viz
          path: deps/trueno-viz
      - uses: actions/checkout@v4
        with:
          repository: paiml/renacer
          path: deps/renacer
      - name: Symlink sibling deps
        run: |
          ln -sf "$GITHUB_WORKSPACE/deps/trueno" "$GITHUB_WORKSPACE/../trueno"
          ln -sf "$GITHUB_WORKSPACE/deps/aprender" "$GITHUB_WORKSPACE/../aprender"
          ln -sf "$GITHUB_WORKSPACE/deps/trueno-db" "$GITHUB_WORKSPACE/../trueno-db"
          ln -sf "$GITHUB_WORKSPACE/deps/trueno-viz" "$GITHUB_WORKSPACE/../trueno-viz"
          ln -sf "$GITHUB_WORKSPACE/deps/renacer" "$GITHUB_WORKSPACE/../renacer"
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo test --lib
      - name: Lint
        run: cargo clippy --lib -- -D warnings

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout sibling deps
        uses: actions/checkout@v4
        with:
          repository: paiml/trueno
          path: deps/trueno
      - uses: actions/checkout@v4
        with:
          repository: paiml/aprender
          path: deps/aprender
      - uses: actions/checkout@v4
        with:
          repository: paiml/trueno-db
          path: deps/trueno-db
      - uses: actions/checkout@v4
        with:
          repository: paiml/trueno-viz
          path: deps/trueno-viz
      - uses: actions/checkout@v4
        with:
          repository: paiml/renacer
          path: deps/renacer
      - name: Symlink sibling deps
        run: |
          ln -sf "$GITHUB_WORKSPACE/deps/trueno" "$GITHUB_WORKSPACE/../trueno"
          ln -sf "$GITHUB_WORKSPACE/deps/aprender" "$GITHUB_WORKSPACE/../aprender"
          ln -sf "$GITHUB_WORKSPACE/deps/trueno-db" "$GITHUB_WORKSPACE/../trueno-db"
          ln -sf "$GITHUB_WORKSPACE/deps/trueno-viz" "$GITHUB_WORKSPACE/../trueno-viz"
          ln -sf "$GITHUB_WORKSPACE/deps/renacer" "$GITHUB_WORKSPACE/../renacer"
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-cov-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo install cargo-llvm-cov --locked || true
      - run: cargo llvm-cov test --lib --lcov --output-path lcov.info
      - uses: codecov/codecov-action@v4
        with:
          files: lcov.info
        continue-on-error: true

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-audit --locked || true
      - run: cargo audit
