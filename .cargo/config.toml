# Build configuration for consistent, fast builds
[build]
incremental = true
target-dir = "/mnt/nvme-raid0/coverage/realizar"

# Fast linking with mold (improves incremental build time)
[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=mold"]

[alias]
t = "test"
c = "check"
b = "build --release"
cl = "clippy --all-targets -- -D warnings"
